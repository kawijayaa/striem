<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Striem | Log investigation</title>
  <script type="module" crossorigin src="/assets/index-BKp6Gwuu.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DwaIz-Z9.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <strong>Striem</strong>
    </div>
  </header>

  <main class="console-layout">
    <section class="panel query-panel">
      <div class="panel-toolbar">
        <div class="toolbar-title"><h2>Query</h2></div>
        <button id="run-query" class="primary">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m5 3 7 5-7 5V3Z"/></svg>
          Run query
          <kbd>Ctrl + Enter</kbd>
        </button>
      </div>
      <div id="query" class="editor-shell" aria-label="KQL query editor"></div>
      <div id="query-error" class="error hidden" role="alert"></div>
      <div class="query-footer"><span>Queries are limited to 1,000 results</span><span id="query-stats">Ready to run</span></div>
    </section>

    <section class="panel results-panel">
      <div class="panel-toolbar results-toolbar">
        <div class="toolbar-title"><h2>Results</h2></div>
      </div>
      <div id="empty-results" class="empty">
        <span class="empty-icon"><svg viewBox="0 0 24 24"><path d="M4 5.5h16v13H4zM4 9.5h16M8 13h3M8 16h6"/></svg></span>
        <strong>No results to display</strong>
        <span>Run a query to inspect security events.</span>
      </div>
      <div class="table-wrap hidden" id="table-wrap"><table><thead id="result-head"></thead><tbody id="result-body"></tbody></table></div>
    </section>

    <aside class="side-panel">
      <section class="side-section field-section">
        <div class="side-heading"><h2>Tables</h2></div>
        <div id="table-list" class="table-list"><span class="muted">Loading tables...</span></div>
        <div class="side-heading"><div><h2>Available fields</h2><span id="field-count">Loading</span></div></div>
        <label class="field-search">
          <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="7" cy="7" r="4.5"/><path d="m10.5 10.5 3 3"/></svg>
          <input id="field-search" type="search" placeholder="Filter fields" autocomplete="off">
        </label>
        <div id="field-list" class="field-list"><span class="muted">Loading field catalog...</span></div>
      </section>

      <section class="side-section reference">
        <div class="side-heading"><h2>Example queries</h2></div>
        <button class="example" data-query="Events&#10;| summarize Events=count() by EventType&#10;| order by Events desc">
          <span class="example-icon"><svg viewBox="0 0 24 24"><path d="M5 19V9M12 19V5M19 19v-7"/></svg></span>
          <span><strong>Operation summary</strong><small>Count events by type</small></span>
        </button>
        <button class="example" data-query="Events&#10;| where EventType == &quot;UserLoginFailed&quot;&#10;| extend ClientIP = tostring(RawData.AuditData.ClientIP), Error = tostring(RawData.AuditData.LogonError)&#10;| project TimeGenerated, User, ClientIP, Error&#10;| order by TimeGenerated desc">
          <span class="example-icon"><svg viewBox="0 0 24 24"><path d="M12 3 4.5 6v5c0 4.2 2.9 7.8 7.5 8.8 4.6-1 7.5-4.6 7.5-8.8V6L12 3Z"/><path d="M9.5 9.5h5M12 9.5v4"/></svg></span>
          <span><strong>Failed sign-ins</strong><small>Review source IPs</small></span>
        </button>
      </section>

    </aside>
  </main>

  <dialog id="raw-dialog">
    <div class="dialog-head"><div><span>Event details</span><h2>Raw JSON</h2></div><button id="close-dialog" aria-label="Close"><svg viewBox="0 0 16 16"><path d="m3 3 10 10M13 3 3 13"/></svg></button></div>
    <pre id="raw-json"></pre>
  </dialog>
</body>
</html>
